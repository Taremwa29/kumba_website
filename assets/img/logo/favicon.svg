<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Kumba Education Center">
  <!-- monitor screen frame (orange) -->
  <path d="M9 22 v15 a5 5 0 0 0 5 5 h36 a5 5 0 0 0 5 -5 V22"
        fill="none" stroke="#FF5A1F" stroke-width="4.5" stroke-linecap="round"/>
  <!-- monitor stand + base -->
  <path d="M32 46 v6 M23 55 h18"
        fill="none" stroke="#FF5A1F" stroke-width="4.5" stroke-linecap="round"/>
  <!-- open book, left + right pages (purple) -->
  <path d="M32 15 C26 11 17 11 11 13 v22 c6 -2 15 -2 21 2 6 -4 15 -4 21 -2 V13 c-6 -2 -15 -2 -21 2 Z"
        fill="#5E17A6"/>
  <!-- book spine -->
  <path d="M32 17 V39" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- cursor arrow (orange) -->
  <path d="M30 29 l11 4.6 -4.6 1.7 -1.7 4.6 Z"
        fill="#FF5A1F" stroke="#ffffff" stroke-width="1.1" stroke-linejoin="round"/>
</svg>
